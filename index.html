<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeMaster - CGPA Calculator</title>
    
    <!-- PWA Link (We will create this file below) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom scrollbar and modal animations */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-indigo-100 min-h-screen pb-12">

    <!-- Top Navigation -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i data-lucide="calculator" class="w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-blue-600">
                    GradeMaster
                </h1>
            </div>
            <button onclick="openSemesterModal()" class="flex items-center gap-2 px-4 py-2 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-lg font-medium transition-colors text-sm">
                <i data-lucide="plus" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Add Semester</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Dashboard Overview Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- CGPA Card -->
            <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-all transform group-hover:scale-110 group-hover:-rotate-12 duration-300">
                    <i data-lucide="graduation-cap" class="w-20 h-20 text-indigo-600"></i>
                </div>
                <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Total CGPA</p>
                <div class="mt-2 flex items-baseline gap-2">
                    <span id="display-cgpa" class="text-5xl font-extrabold text-slate-900">0.00</span>
                    <span class="text-lg text-slate-500 font-medium">/ 5.0</span>
                </div>
                <div class="mt-4 flex items-center gap-2" id="degree-container">
                    <!-- Injected via JS -->
                </div>
            </div>

            <!-- Total Credits Card -->
            <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between">
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Total Credits</p>
                    <div class="bg-blue-50 p-2 rounded-lg text-blue-600">
                        <i data-lucide="book-open" class="w-5 h-5"></i>
                    </div>
                </div>
                <div class="mt-4">
                    <span id="display-credits" class="text-4xl font-bold text-slate-900">0</span>
                    <p class="text-sm text-slate-500 mt-1">Units completed</p>
                </div>
            </div>

            <!-- Total Points Card -->
            <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between">
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Grade Points</p>
                    <div class="bg-emerald-50 p-2 rounded-lg text-emerald-600">
                        <i data-lucide="award" class="w-5 h-5"></i>
                    </div>
                </div>
                <div class="mt-4">
                    <span id="display-points" class="text-4xl font-bold text-slate-900">0</span>
                    <p class="text-sm text-slate-500 mt-1">Total points earned</p>
                </div>
            </div>
        </div>

        <!-- Semesters Container -->
        <div id="semesters-container" class="space-y-6">
            <!-- Dynamic Content Injected Here -->
        </div>

    </main>

    <!-- ================= MODALS ================= -->

    <!-- Semester Modal -->
    <div id="semester-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden modal-enter">
            <div class="flex items-center justify-between p-5 border-b border-slate-100">
                <h3 id="semester-modal-title" class="text-xl font-bold text-slate-800">Add Semester</h3>
                <button onclick="closeModal('semester-modal')" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="semester-form" onsubmit="saveSemester(event)" class="p-5 bg-slate-50/50">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Semester Name</label>
                    <input type="text" id="semester-name" required placeholder="e.g. Year 1 - First Semester" class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all" />
                </div>
                <div class="flex gap-3">
                    <button type="button" onclick="closeModal('semester-modal')" class="flex-1 px-4 py-2.5 border border-slate-300 text-slate-700 rounded-xl hover:bg-slate-50 font-medium transition-colors">Cancel</button>
                    <button type="submit" class="flex-1 px-4 py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-medium transition-colors flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i> Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Course Modal -->
    <div id="course-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden modal-enter">
            <div class="flex items-center justify-between p-5 border-b border-slate-100">
                <h3 id="course-modal-title" class="text-xl font-bold text-slate-800">Add Course</h3>
                <button onclick="closeModal('course-modal')" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="course-form" onsubmit="saveCourse(event)" class="p-5 bg-slate-50/50">
                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Course Name / Code</label>
                        <input type="text" id="course-name" required placeholder="e.g. MTH 101" class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none uppercase transition-all" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Credit Units</label>
                        <input type="number" id="course-credits" required min="1" max="10" value="3" class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all" />
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1.5">CA Score</label>
                            <input type="number" id="course-ca" required min="0" max="40" placeholder="0" class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all" oninput="updateLivePreview()" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1.5">Exam Score</label>
                            <input type="number" id="course-exam" required min="0" max="60" placeholder="0" class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all" oninput="updateLivePreview()" />
                        </div>
                    </div>

                    <!-- Live Preview -->
                    <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 flex items-center justify-between mt-2">
                        <div>
                            <p class="text-xs text-indigo-600 font-semibold uppercase">Live Total</p>
                            <p class="text-2xl font-bold text-indigo-900">
                                <span id="live-total">0</span><span class="text-sm text-indigo-400 font-normal"> / 100</span>
                            </p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-indigo-600 font-semibold uppercase">Projected Grade</p>
                            <span id="live-grade" class="inline-flex items-center mt-1 justify-center px-3 py-1 rounded-lg text-sm font-bold border text-slate-500 bg-slate-100 border-slate-200">
                                -
                            </span>
                        </div>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button type="button" onclick="closeModal('course-modal')" class="flex-1 px-4 py-2.5 border border-slate-300 text-slate-700 rounded-xl hover:bg-slate-50 font-medium transition-colors">Cancel</button>
                    <button type="submit" class="flex-1 px-4 py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-medium transition-colors flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i> Save Course
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // --- State Management ---
        let semesters = JSON.parse(localStorage.getItem('grademaster_data')) || [];
        
        let editingSemesterId = null;
        let activeSemesterIdForCourse = null;
        let editingCourseId = null;

        // Save to local storage
        function saveData() {
            localStorage.setItem('grademaster_data', JSON.stringify(semesters));
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        // --- Logic & Calculations ---
        function getGradeInfo(total) {
            if (total > 100) return { letter: 'Err', points: 0, color: 'text-red-800 bg-red-200 border-red-300' };
            if (total >= 70) return { letter: 'A', points: 5, color: 'text-emerald-700 bg-emerald-100 border-emerald-200' };
            if (total >= 60) return { letter: 'B', points: 4, color: 'text-blue-700 bg-blue-100 border-blue-200' };
            if (total >= 50) return { letter: 'C', points: 3, color: 'text-yellow-700 bg-yellow-100 border-yellow-200' };
            if (total >= 45) return { letter: 'D', points: 2, color: 'text-orange-700 bg-orange-100 border-orange-200' };
            if (total >= 40) return { letter: 'E', points: 1, color: 'text-rose-600 bg-rose-100 border-rose-200' };
            return { letter: 'F', points: 0, color: 'text-red-800 bg-red-200 border-red-300' };
        }

        function getClassOfDegree(cgpa) {
            if (cgpa === 0 && semesters.length === 0) return { title: 'No Data', color: 'text-slate-400', icon: 'minus' };
            if (cgpa >= 4.50) return { title: 'First Class Honors', color: 'text-emerald-600', icon: 'award' };
            if (cgpa >= 3.50) return { title: 'Second Class Upper', color: 'text-blue-600', icon: 'award' };
            if (cgpa >= 2.40) return { title: 'Second Class Lower', color: 'text-yellow-600', icon: 'award' };
            if (cgpa >= 1.50) return { title: 'Third Class', color: 'text-orange-600', icon: 'award' };
            if (cgpa >= 1.00) return { title: 'Pass', color: 'text-rose-500', icon: 'award' };
            return { title: 'Fail', color: 'text-red-600', icon: 'x-circle' };
        }

        function calculateSemesterStats(courses) {
            let tCredits = 0;
            let tPoints = 0;
            courses.forEach(c => {
                const totalScore = Number(c.ca) + Number(c.exam);
                const grade = getGradeInfo(totalScore);
                tCredits += Number(c.credits);
                tPoints += (Number(c.credits) * grade.points);
            });
            return {
                gpa: tCredits > 0 ? (tPoints / tCredits) : 0,
                totalCredits: tCredits,
                totalPoints: tPoints
            };
        }

        // --- UI Rendering ---
        function renderApp() {
            let grandCredits = 0;
            let grandPoints = 0;

            const container = document.getElementById('semesters-container');
            container.innerHTML = ''; // Clear current view

            if (semesters.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 bg-white rounded-2xl border border-slate-200 border-dashed">
                        <i data-lucide="graduation-cap" class="w-12 h-12 mx-auto text-slate-300 mb-4"></i>
                        <h3 class="text-lg font-medium text-slate-900">No semesters added yet</h3>
                        <p class="text-slate-500 mt-1 mb-6">Start by adding your first semester to track your GPA.</p>
                        <button onclick="openSemesterModal()" class="inline-flex items-center gap-2 px-6 py-3 bg-indigo-600 text-white hover:bg-indigo-700 rounded-xl font-medium transition-colors shadow-sm">
                            <i data-lucide="plus" class="w-4 h-4"></i> Add First Semester
                        </button>
                    </div>`;
            } else {
                semesters.forEach(semester => {
                    const stats = calculateSemesterStats(semester.courses);
                    grandCredits += stats.totalCredits;
                    grandPoints += stats.totalPoints;

                    // Generate Course Rows
                    let courseHTML = '';
                    if (semester.courses.length === 0) {
                        courseHTML = `<div class="p-8 text-center text-slate-500">No courses added to this semester yet.</div>`;
                    } else {
                        courseHTML = `
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-white border-b border-slate-100 text-xs uppercase tracking-wider text-slate-500 font-semibold">
                                        <th class="p-4 sm:px-6 whitespace-nowrap">Course</th>
                                        <th class="p-4 text-center">Credits</th>
                                        <th class="p-4 text-center whitespace-nowrap">CA & Exam</th>
                                        <th class="p-4 text-center">Total</th>
                                        <th class="p-4 text-center">Grade</th>
                                        <th class="p-4 text-right sm:px-6">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    ${semester.courses.map(course => {
                                        const total = Number(course.ca) + Number(course.exam);
                                        const grade = getGradeInfo(total);
                                        return `
                                        <tr class="hover:bg-slate-50/50 transition-colors group">
                                            <td class="p-4 sm:px-6">
                                                <div class="font-semibold text-slate-800">${course.name}</div>
                                            </td>
                                            <td class="p-4 text-center text-slate-600">${course.credits}</td>
                                            <td class="p-4 text-center text-slate-600 text-sm">
                                                <span class="text-slate-400">CA:</span> ${course.ca} | <span class="text-slate-400">Ex:</span> ${course.exam}
                                            </td>
                                            <td class="p-4 text-center font-bold text-slate-800">${total}</td>
                                            <td class="p-4 text-center">
                                                <span class="inline-flex items-center justify-center px-2.5 py-1 rounded-md text-xs font-bold border ${grade.color}">
                                                    ${grade.letter}
                                                </span>
                                            </td>
                                            <td class="p-4 sm:px-6 text-right">
                                                <div class="flex items-center justify-end gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button onclick="openCourseModal('${semester.id}', '${course.id}')" class="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-md transition-colors" title="Edit Course">
                                                        <i data-lucide="edit-2" class="w-4 h-4"></i>
                                                    </button>
                                                    <button onclick="deleteCourse('${semester.id}', '${course.id}')" class="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-md transition-colors" title="Delete Course">
                                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>`;
                    }

                    // Semester Card
                    const semCard = document.createElement('div');
                    semCard.className = "bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden";
                    semCard.innerHTML = `
                        <div class="bg-slate-50/50 border-b border-slate-200 p-5 sm:px-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                            <div>
                                <h2 class="text-lg font-bold text-slate-800">${semester.name}</h2>
                                <div class="flex flex-wrap items-center gap-x-4 gap-y-2 mt-1.5 text-sm text-slate-600">
                                    <span class="flex items-center gap-1.5 font-medium bg-white px-2.5 py-1 rounded-md border border-slate-200 shadow-sm">
                                        GPA: <span class="text-indigo-600 font-bold">${stats.gpa.toFixed(2)}</span>
                                    </span>
                                    <span class="text-slate-400">•</span>
                                    <span>${stats.totalCredits} Credits</span>
                                    <span class="text-slate-400">•</span>
                                    <span>${semester.courses.length} Courses</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="openCourseModal('${semester.id}')" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-indigo-600 text-white hover:bg-indigo-700 rounded-lg font-medium transition-colors text-sm shadow-sm">
                                    <i data-lucide="plus" class="w-4 h-4"></i> Add Course
                                </button>
                                <button onclick="openSemesterModal('${semester.id}')" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition-colors" title="Edit Semester">
                                    <i data-lucide="edit-2" class="w-4.5 h-4.5"></i>
                                </button>
                                <button onclick="deleteSemester('${semester.id}')" class="p-2 text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors" title="Delete Semester">
                                    <i data-lucide="trash-2" class="w-4.5 h-4.5"></i>
                                </button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">${courseHTML}</div>
                    `;
                    container.appendChild(semCard);
                });
            }

            // Update Top Dashboard
            const cgpa = grandCredits > 0 ? (grandPoints / grandCredits) : 0;
            document.getElementById('display-cgpa').innerText = cgpa.toFixed(2);
            document.getElementById('display-credits').innerText = grandCredits;
            document.getElementById('display-points').innerText = grandPoints;

            const degree = getClassOfDegree(cgpa);
            document.getElementById('degree-container').innerHTML = `
                <i data-lucide="${degree.icon}" class="w-5 h-5 ${degree.color}"></i>
                <span class="text-sm font-medium ${degree.color}">${degree.title}</span>
            `;

            // Re-initialize icons for newly added HTML
            lucide.createIcons();
        }

        // --- Modal Interactions ---
        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        function openSemesterModal(semesterId = null) {
            editingSemesterId = semesterId;
            const input = document.getElementById('semester-name');
            const title = document.getElementById('semester-modal-title');
            
            if (semesterId) {
                const sem = semesters.find(s => s.id === semesterId);
                input.value = sem.name;
                title.innerText = 'Edit Semester';
            } else {
                input.value = `Semester ${semesters.length + 1}`;
                title.innerText = 'Add New Semester';
            }
            document.getElementById('semester-modal').classList.remove('hidden');
            input.focus();
        }

        function openCourseModal(semesterId, courseId = null) {
            activeSemesterIdForCourse = semesterId;
            editingCourseId = courseId;
            
            const form = document.getElementById('course-form');
            const title = document.getElementById('course-modal-title');
            
            if (courseId) {
                const sem = semesters.find(s => s.id === semesterId);
                const course = sem.courses.find(c => c.id === courseId);
                
                document.getElementById('course-name').value = course.name;
                document.getElementById('course-credits').value = course.credits;
                document.getElementById('course-ca').value = course.ca;
                document.getElementById('course-exam').value = course.exam;
                title.innerText = 'Edit Course';
            } else {
                form.reset();
                document.getElementById('course-credits').value = 3; // default
                title.innerText = 'Add Course';
            }
            
            updateLivePreview();
            document.getElementById('course-modal').classList.remove('hidden');
            document.getElementById('course-name').focus();
        }

        // --- Form Handlers & CRUD ---
        function saveSemester(e) {
            e.preventDefault();
            const name = document.getElementById('semester-name').value.trim();
            if (!name) return;

            if (editingSemesterId) {
                const sem = semesters.find(s => s.id === editingSemesterId);
                if (sem) sem.name = name;
            } else {
                semesters.push({ id: generateId(), name: name, courses: [] });
            }

            saveData();
            renderApp();
            closeModal('semester-modal');
        }

        function deleteSemester(id) {
            if (confirm("Are you sure you want to delete this entire semester? All courses will be lost.")) {
                semesters = semesters.filter(s => s.id !== id);
                saveData();
                renderApp();
            }
        }

        function saveCourse(e) {
            e.preventDefault();
            const ca = Number(document.getElementById('course-ca').value) || 0;
            const exam = Number(document.getElementById('course-exam').value) || 0;
            
            if (ca > 40) return alert("CA Score cannot exceed 40.");
            if (exam > 60) return alert("Exam Score cannot exceed 60.");

            const newCourse = {
                id: editingCourseId || generateId(),
                name: document.getElementById('course-name').value.toUpperCase(),
                credits: Number(document.getElementById('course-credits').value),
                ca: ca,
                exam: exam
            };

            const semIndex = semesters.findIndex(s => s.id === activeSemesterIdForCourse);
            if (semIndex > -1) {
                if (editingCourseId) {
                    const cIndex = semesters[semIndex].courses.findIndex(c => c.id === editingCourseId);
                    if (cIndex > -1) semesters[semIndex].courses[cIndex] = newCourse;
                } else {
                    semesters[semIndex].courses.push(newCourse);
                }
            }

            saveData();
            renderApp();
            closeModal('course-modal');
        }

        function deleteCourse(semesterId, courseId) {
            if (confirm("Remove this course?")) {
                const sem = semesters.find(s => s.id === semesterId);
                if (sem) {
                    sem.courses = sem.courses.filter(c => c.id !== courseId);
                    saveData();
                    renderApp();
                }
            }
        }

        // --- Live Preview in Modal ---
        function updateLivePreview() {
            const ca = Number(document.getElementById('course-ca').value) || 0;
            const exam = Number(document.getElementById('course-exam').value) || 0;
            const total = ca + exam;
            
            document.getElementById('live-total').innerText = total;
            const gradeBadge = document.getElementById('live-grade');
            
            if (ca > 40 || exam > 60 || total > 100) {
                gradeBadge.innerText = 'Err';
                gradeBadge.className = 'inline-flex items-center mt-1 justify-center px-3 py-1 rounded-lg text-sm font-bold border text-red-800 bg-red-200 border-red-300';
            } else {
                const info = getGradeInfo(total);
                gradeBadge.innerText = info.letter;
                gradeBadge.className = `inline-flex items-center mt-1 justify-center px-3 py-1 rounded-lg text-sm font-bold border ${info.color}`;
            }
        }

        // --- Initialization ---
        
        // Add sample data if empty on first load
        if (semesters.length === 0 && !localStorage.getItem('grademaster_data_init')) {
            semesters = [{
                id: generateId(),
                name: 'Year 1 - First Semester',
                courses: [
                    { id: generateId(), name: 'MTH 101', credits: 3, ca: 25, exam: 55 },
                    { id: generateId(), name: 'ENG 101', credits: 2, ca: 20, exam: 45 },
                    { id: generateId(), name: 'PHY 101', credits: 3, ca: 15, exam: 40 },
                ]
            }];
            localStorage.setItem('grademaster_data_init', 'true');
            saveData();
        }

        renderApp();

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Registration failed: ', err));
            });
        }
    </script>
</body>
</html>
