<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GradeMaster - GPA Calculator</title>
  
  <!-- PWA Requirements -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons (CDN) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Add a little animation for the modals */
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-animate { animation: zoomIn 0.2s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-indigo-100">

  <div id="root"></div>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.log('Service Worker Registration failed: ', err);
        });
      });
    }
  </script>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- Helper Functions & Constants ---
    const getGradeInfo = (total) => {
      if (total > 100) return { letter: 'Err', points: 0, color: 'text-red-800 bg-red-200 border-red-300' };
      if (total >= 70) return { letter: 'A', points: 5, color: 'text-emerald-700 bg-emerald-100 border-emerald-200' };
      if (total >= 60) return { letter: 'B', points: 4, color: 'text-blue-700 bg-blue-100 border-blue-200' };
      if (total >= 50) return { letter: 'C', points: 3, color: 'text-yellow-700 bg-yellow-100 border-yellow-200' };
      if (total >= 45) return { letter: 'D', points: 2, color: 'text-orange-700 bg-orange-100 border-orange-200' };
      if (total >= 40) return { letter: 'E', points: 1, color: 'text-rose-600 bg-rose-100 border-rose-200' };
      return { letter: 'F', points: 0, color: 'text-red-800 bg-red-200 border-red-300' };
    };

    const getClassOfDegree = (cgpa) => {
      if (cgpa >= 4.50) return { title: 'First Class Honors', color: 'text-emerald-600' };
      if (cgpa >= 3.50) return { title: 'Second Class Upper', color: 'text-blue-600' };
      if (cgpa >= 2.40) return { title: 'Second Class Lower', color: 'text-yellow-600' };
      if (cgpa >= 1.50) return { title: 'Third Class', color: 'text-orange-600' };
      if (cgpa >= 1.00) return { title: 'Pass', color: 'text-rose-500' };
      return { title: 'Fail', color: 'text-red-600' };
    };

    const generateId = () => Math.random().toString(36).substr(2, 9);

    // --- Sub-components ---
    // ✅ BUG FIX: Moved ModalOverlay OUTSIDE of App so it doesn't unmount on every keystroke
    const ModalOverlay = ({ isOpen, onClose, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
          <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden modal-animate">
            {children}
          </div>
        </div>
      );
    };

    // --- Main Component ---
    function App() {
      // --- State ---
      // Bonus: Loads initial state from localStorage so data isn't lost on refresh!
      const [semesters, setSemesters] = useState(() => {
        const savedData = localStorage.getItem('grademaster_react_data');
        if (savedData) {
          return JSON.parse(savedData);
        }
        return [
          {
            id: 'sem-1',
            name: 'Year 1 - First Semester',
            courses: [
              { id: 'c-1', name: 'MTH 101', credits: 3, ca: 25, exam: 55 },
              { id: 'c-2', name: 'ENG 101', credits: 2, ca: 20, exam: 45 },
              { id: 'c-3', name: 'PHY 101', credits: 3, ca: 15, exam: 40 },
            ]
          }
        ];
      });

      // Bonus: Automatically saves to localStorage whenever semesters change
      useEffect(() => {
        localStorage.setItem('grademaster_react_data', JSON.stringify(semesters));
      }, [semesters]);

      const [isSemesterModalOpen, setIsSemesterModalOpen] = useState(false);
      const [isCourseModalOpen, setIsCourseModalOpen] = useState(false);
      
      const [editingSemester, setEditingSemester] = useState(null);
      const [editingCourse, setEditingCourse] = useState(null);
      const [activeSemesterId, setActiveSemesterId] = useState(null);

      const [semesterForm, setSemesterForm] = useState({ name: '' });
      const [courseForm, setCourseForm] = useState({ name: '', credits: 3, ca: '', exam: '' });

      // --- Calculations ---
      const calculateSemesterStats = (courses) => {
        let totalCredits = 0;
        let totalPoints = 0;
        courses.forEach(course => {
          const totalScore = Number(course.ca) + Number(course.exam);
          const grade = getGradeInfo(totalScore);
          totalCredits += Number(course.credits);
          totalPoints += (Number(course.credits) * grade.points);
        });
        const gpa = totalCredits > 0 ? (totalPoints / totalCredits) : 0;
        return { gpa, totalCredits, totalPoints };
      };

      const { cgpa, totalCredits, totalPoints } = useMemo(() => {
        let allCredits = 0;
        let allPoints = 0;
        semesters.forEach(semester => {
          const stats = calculateSemesterStats(semester.courses);
          allCredits += stats.totalCredits;
          allPoints += stats.totalPoints;
        });
        const cgpa = allCredits > 0 ? (allPoints / allCredits) : 0;
        return { cgpa, totalCredits: allCredits, totalPoints: allPoints };
      }, [semesters]);

      const classOfDegree = getClassOfDegree(cgpa);

      // --- Handlers: Semesters ---
      const handleOpenSemesterModal = (semester = null) => {
        if (semester) {
          setEditingSemester(semester);
          setSemesterForm({ name: semester.name });
        } else {
          setEditingSemester(null);
          setSemesterForm({ name: `Semester ${semesters.length + 1}` });
        }
        setIsSemesterModalOpen(true);
      };

      const handleSaveSemester = (e) => {
        e.preventDefault();
        if (!semesterForm.name.trim()) return;
        if (editingSemester) {
          setSemesters(semesters.map(s => s.id === editingSemester.id ? { ...s, name: semesterForm.name } : s));
        } else {
          setSemesters([...semesters, { id: generateId(), name: semesterForm.name, courses: [] }]);
        }
        setIsSemesterModalOpen(false);
      };

      const handleDeleteSemester = (id) => {
        if (window.confirm('Are you sure you want to delete this entire semester?')) {
          setSemesters(semesters.filter(s => s.id !== id));
        }
      };

      // --- Handlers: Courses ---
      const handleOpenCourseModal = (semesterId, course = null) => {
        setActiveSemesterId(semesterId);
        if (course) {
          setEditingCourse(course);
          setCourseForm({ ...course });
        } else {
          setEditingCourse(null);
          setCourseForm({ name: '', credits: 3, ca: '', exam: '' });
        }
        setIsCourseModalOpen(true);
      };

      const handleSaveCourse = (e) => {
        e.preventDefault();
        const ca = Number(courseForm.ca);
        const exam = Number(courseForm.exam);
        
        if (ca > 40) {
          alert("CA Score cannot exceed 40.");
          return;
        }
        if (exam > 60) {
          alert("Exam Score cannot exceed 60.");
          return;
        }
        if (ca + exam > 100) {
          alert("Total score (CA + Exam) cannot exceed 100.");
          return;
        }

        const updatedCourse = {
          ...courseForm,
          id: editingCourse ? editingCourse.id : generateId(),
          credits: Number(courseForm.credits),
          ca: ca,
          exam: exam
        };

        setSemesters(semesters.map(semester => {
          if (semester.id === activeSemesterId) {
            let updatedCourses;
            if (editingCourse) {
              updatedCourses = semester.courses.map(c => c.id === editingCourse.id ? updatedCourse : c);
            } else {
              updatedCourses = [...semester.courses, updatedCourse];
            }
            return { ...semester, courses: updatedCourses };
          }
          return semester;
        }));

        setIsCourseModalOpen(false);
      };

      const handleDeleteCourse = (semesterId, courseId) => {
        if (window.confirm('Remove this course?')) {
          setSemesters(semesters.map(s => {
            if (s.id === semesterId) {
              return { ...s, courses: s.courses.filter(c => c.id !== courseId) };
            }
            return s;
          }));
        }
      };

      return (
        <div className="min-h-screen pb-12">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="bg-indigo-600 p-2 rounded-lg text-white flex items-center justify-center">
                  <i className="ph-fill ph-calculator text-xl"></i>
                </div>
                <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-blue-600">
                  GradeMaster
                </h1>
              </div>
              <button 
                onClick={() => handleOpenSemesterModal()}
                className="flex items-center gap-2 px-4 py-2 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-lg font-medium transition-colors text-sm"
              >
                <i className="ph-bold ph-plus text-base"></i>
                <span className="hidden sm:inline">Add Semester</span>
              </button>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
              <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm relative overflow-hidden group">
                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-all transform group-hover:scale-110 group-hover:-rotate-12 duration-300">
                  <i className="ph-fill ph-graduation-cap text-[80px] text-indigo-600"></i>
                </div>
                <p className="text-sm font-semibold text-slate-500 uppercase tracking-wider">Total CGPA</p>
                <div className="mt-2 flex items-baseline gap-2">
                  <span className="text-5xl font-extrabold text-slate-900">{cgpa.toFixed(2)}</span>
                  <span className="text-lg text-slate-500 font-medium">/ 5.0</span>
                </div>
                <div className="mt-4 flex items-center gap-2">
                  <i className={`ph-fill ph-medal text-lg ${classOfDegree.color}`}></i>
                  <span className={`text-sm font-medium ${classOfDegree.color}`}>
                    {classOfDegree.title}
                  </span>
                </div>
              </div>

              <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                <div className="flex items-center justify-between">
                  <p className="text-sm font-semibold text-slate-500 uppercase tracking-wider">Total Credits</p>
                  <div className="bg-blue-50 p-2 rounded-lg text-blue-600 flex items-center justify-center">
                    <i className="ph-fill ph-book-open text-xl"></i>
                  </div>
                </div>
                <div className="mt-4">
                  <span className="text-4xl font-bold text-slate-900">{totalCredits}</span>
                  <p className="text-sm text-slate-500 mt-1">Units completed</p>
                </div>
              </div>

              <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                <div className="flex items-center justify-between">
                  <p className="text-sm font-semibold text-slate-500 uppercase tracking-wider">Grade Points</p>
                  <div className="bg-emerald-50 p-2 rounded-lg text-emerald-600 flex items-center justify-center">
                    <i className="ph-fill ph-calculator text-xl"></i>
                  </div>
                </div>
                <div className="mt-4">
                  <span className="text-4xl font-bold text-slate-900">{totalPoints}</span>
                  <p className="text-sm text-slate-500 mt-1">Total points earned</p>
                </div>
              </div>
            </div>

            <div className="space-y-6">
              {semesters.length === 0 ? (
                <div className="text-center py-16 bg-white rounded-2xl border border-slate-200 border-dashed">
                  <i className="ph-fill ph-graduation-cap text-[48px] text-slate-300 mx-auto mb-4 block"></i>
                  <h3 className="text-lg font-medium text-slate-900">No semesters added yet</h3>
                  <p className="text-slate-500 mt-1 mb-6">Start by adding your first semester to track your GPA.</p>
                  <button 
                    onClick={() => handleOpenSemesterModal()}
                    className="inline-flex items-center gap-2 px-6 py-3 bg-indigo-600 text-white hover:bg-indigo-700 rounded-xl font-medium transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-plus text-lg"></i> Add First Semester
                  </button>
                </div>
              ) : (
                semesters.map((semester) => {
                  const stats = calculateSemesterStats(semester.courses);
                  return (
                    <div key={semester.id} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                      <div className="bg-slate-50/50 border-b border-slate-200 p-5 sm:px-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div>
                          <h2 className="text-lg font-bold text-slate-800">{semester.name}</h2>
                          <div className="flex flex-wrap items-center gap-x-4 gap-y-2 mt-1.5 text-sm text-slate-600">
                            <span className="flex items-center gap-1.5 font-medium bg-white px-2.5 py-1 rounded-md border border-slate-200 shadow-sm">
                              GPA: <span className="text-indigo-600 font-bold">{stats.gpa.toFixed(2)}</span>
                            </span>
                            <span className="text-slate-400">•</span>
                            <span>{stats.totalCredits} Credits</span>
                            <span className="text-slate-400">•</span>
                            <span>{semester.courses.length} Courses</span>
                          </div>
                        </div>
                        <div className="flex items-center gap-2">
                          <button 
                            onClick={() => handleOpenCourseModal(semester.id)}
                            className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-indigo-600 text-white hover:bg-indigo-700 rounded-lg font-medium transition-colors text-sm shadow-sm"
                          >
                            <i className="ph-bold ph-plus text-base"></i> Add Course
                          </button>
                          <button 
                            onClick={() => handleOpenSemesterModal(semester)}
                            className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition-colors"
                          >
                            <i className="ph-bold ph-pencil-simple text-lg"></i>
                          </button>
                          <button 
                            onClick={() => handleDeleteSemester(semester.id)}
                            className="p-2 text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors"
                          >
                            <i className="ph-bold ph-trash text-lg"></i>
                          </button>
                        </div>
                      </div>

                      <div className="overflow-x-auto">
                        {semester.courses.length === 0 ? (
                          <div className="p-8 text-center text-slate-500">
                            No courses added to this semester yet.
                          </div>
                        ) : (
                          <table className="w-full text-left border-collapse min-w-[600px]">
                            <thead>
                              <tr className="bg-white border-b border-slate-100 text-xs uppercase tracking-wider text-slate-500 font-semibold">
                                <th className="p-4 sm:px-6">Course</th>
                                <th className="p-4 text-center">Credits</th>
                                <th className="p-4 text-center">CA (Max 40)</th>
                                <th className="p-4 text-center">Exam (Max 60)</th>
                                <th className="p-4 text-center">Total</th>
                                <th className="p-4 text-center">Grade</th>
                                <th className="p-4 text-right sm:px-6">Actions</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                              {semester.courses.map((course) => {
                                const totalScore = Number(course.ca) + Number(course.exam);
                                const grade = getGradeInfo(totalScore);
                                
                                return (
                                  <tr key={course.id} className="hover:bg-slate-50/50 transition-colors group">
                                    <td className="p-4 sm:px-6">
                                      <div className="font-semibold text-slate-800">{course.name}</div>
                                    </td>
                                    <td className="p-4 text-center text-slate-600">{course.credits}</td>
                                    <td className="p-4 text-center text-slate-600">{course.ca}</td>
                                    <td className="p-4 text-center text-slate-600">{course.exam}</td>
                                    <td className="p-4 text-center font-semibold text-slate-800">{totalScore}</td>
                                    <td className="p-4 text-center">
                                      <span className={`inline-flex items-center justify-center px-2.5 py-1 rounded-md text-xs font-bold border ${grade.color}`}>
                                        {grade.letter}
                                      </span>
                                    </td>
                                    <td className="p-4 sm:px-6 text-right">
                                      <div className="flex items-center justify-end gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button 
                                          onClick={() => handleOpenCourseModal(semester.id, course)}
                                          className="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-md transition-colors"
                                        >
                                          <i className="ph-bold ph-pencil-simple text-lg"></i>
                                        </button>
                                        <button 
                                          onClick={() => handleDeleteCourse(semester.id, course.id)}
                                          className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-md transition-colors"
                                        >
                                          <i className="ph-bold ph-trash text-lg"></i>
                                        </button>
                                      </div>
                                    </td>
                                  </tr>
                                );
                              })}
                            </tbody>
                          </table>
                        )}
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </main>

          <ModalOverlay isOpen={isSemesterModalOpen} onClose={() => setIsSemesterModalOpen(false)}>
            <div className="flex items-center justify-between p-5 sm:p-6 border-b border-slate-100 bg-white">
              <h3 className="text-xl font-bold text-slate-800">
                {editingSemester ? 'Edit Semester' : 'Add New Semester'}
              </h3>
              <button 
                onClick={() => setIsSemesterModalOpen(false)}
                className="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100 transition-colors"
              >
                <i className="ph-bold ph-x text-xl"></i>
              </button>
            </div>
            <form onSubmit={handleSaveSemester} className="p-5 sm:p-6 bg-slate-50/50">
              <div className="mb-6">
                <label className="block text-sm font-medium text-slate-700 mb-1.5">Semester Name</label>
                <input
                  type="text"
                  required
                  placeholder="e.g. Year 1 - First Semester"
                  value={semesterForm.name}
                  onChange={(e) => setSemesterForm({ ...semesterForm, name: e.target.value })}
                  className="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all"
                />
              </div>
              <div className="flex gap-3">
                <button
                  type="button"
                  onClick={() => setIsSemesterModalOpen(false)}
                  className="flex-1 px-4 py-2.5 border border-slate-300 text-slate-700 rounded-xl hover:bg-slate-50 font-medium transition-colors"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  className="flex-1 px-4 py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-medium transition-colors flex items-center justify-center gap-2 shadow-sm"
                >
                  <i className="ph-bold ph-floppy-disk text-lg"></i> Save
                </button>
              </div>
            </form>
          </ModalOverlay>

          <ModalOverlay isOpen={isCourseModalOpen} onClose={() => setIsCourseModalOpen(false)}>
            <div className="flex items-center justify-between p-5 sm:p-6 border-b border-slate-100 bg-white">
              <h3 className="text-xl font-bold text-slate-800">
                {editingCourse ? 'Edit Course' : 'Add Course'}
              </h3>
              <button 
                onClick={() => setIsCourseModalOpen(false)}
                className="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100 transition-colors"
              >
                <i className="ph-bold ph-x text-xl"></i>
              </button>
            </div>
            <form onSubmit={handleSaveCourse} className="p-5 sm:p-6 bg-slate-50/50">
              <div className="space-y-4 mb-6">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1.5">Course Name / Code</label>
                  <input
                    type="text"
                    required
                    placeholder="e.g. MTH 101"
                    value={courseForm.name}
                    onChange={(e) => setCourseForm({ ...courseForm, name: e.target.value })}
                    className="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all uppercase"
                  />
                </div>
                
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1.5">Credit Units</label>
                  <input
                    type="number"
                    required
                    min="1"
                    max="10"
                    value={courseForm.credits}
                    onChange={(e) => setCourseForm({ ...courseForm, credits: e.target.value })}
                    className="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all"
                  />
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1.5">CA Score</label>
                    <input
                      type="number"
                      required
                      min="0"
                      max="40"
                      placeholder="0"
                      value={courseForm.ca === 0 && !editingCourse ? '' : courseForm.ca}
                      onChange={(e) => setCourseForm({ ...courseForm, ca: e.target.value })}
                      className="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1.5">Exam Score</label>
                    <input
                      type="number"
                      required
                      min="0"
                      max="60"
                      placeholder="0"
                      value={courseForm.exam === 0 && !editingCourse ? '' : courseForm.exam}
                      onChange={(e) => setCourseForm({ ...courseForm, exam: e.target.value })}
                      className="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all"
                    />
                  </div>
                </div>

                <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-4 flex items-center justify-between mt-2">
                  <div>
                    <p className="text-xs text-indigo-600 font-semibold uppercase">Live Total</p>
                    <p className="text-2xl font-bold text-indigo-900">
                      {Number(courseForm.ca || 0) + Number(courseForm.exam || 0)}
                      <span className="text-sm text-indigo-400 font-normal"> / 100</span>
                    </p>
                  </div>
                  <div className="text-right">
                    <p className="text-xs text-indigo-600 font-semibold uppercase">Projected Grade</p>
                    {(() => {
                      const total = Number(courseForm.ca || 0) + Number(courseForm.exam || 0);
                      const info = getGradeInfo(total);
                      return (
                        <span className={`inline-flex items-center mt-1 justify-center px-3 py-1 rounded-lg text-sm font-bold border ${info.color}`}>
                          {total > 100 ? 'Invalid' : info.letter}
                        </span>
                      );
                    })()}
                  </div>
                </div>
              </div>

              <div className="flex gap-3">
                <button
                  type="button"
                  onClick={() => setIsCourseModalOpen(false)}
                  className="flex-1 px-4 py-2.5 border border-slate-300 text-slate-700 rounded-xl hover:bg-slate-50 font-medium transition-colors"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  className="flex-1 px-4 py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-medium transition-colors flex items-center justify-center gap-2 shadow-sm"
                >
                  <i className="ph-bold ph-floppy-disk text-lg"></i> Save Course
                </button>
              </div>
            </form>
          </ModalOverlay>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
